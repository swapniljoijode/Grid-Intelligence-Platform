name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Pre-commit (secret scan, ruff, sqlfluff) ───────────────────────────
  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: pre-commit/action@v3.0.1

  # ── 2. Python lint (ruff) ─────────────────────────────────────────────────
  lint-python:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v1
        with:
          args: "check ."

  # ── 3. SQL lint (sqlfluff — T-SQL / Fabric Warehouse) ─────────────────────
  lint-sql:
    name: SQLFluff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install sqlfluff sqlfluff-templater-dbt dbt-fabric
      - run: |
          sqlfluff lint transform/dbt/models \
            --dialect tsql \
            --templater dbt \
            --processes 4
        continue-on-error: true   # non-blocking until models are populated (T3)

  # ── 4. Unit tests (pytest) ─────────────────────────────────────────────────
  pytest:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt pytest pytest-cov
      - run: pytest tests/ -v --cov=. --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml

  # ── 5. dbt build and test (requires Fabric credentials) ──────────────────
  dbt-build:
    name: dbt build + test
    runs-on: ubuntu-latest
    needs: [lint-python, lint-sql, pytest]
    # Skip on forks (no secrets) — runs on PRs from the same repo and main
    if: ${{ vars.FABRIC_SERVER != '' && github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      FABRIC_SERVER: ${{ secrets.FABRIC_SERVER }}
      FABRIC_DATABASE: ${{ secrets.FABRIC_DATABASE }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ODBC Driver 18
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update && sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev
      - run: pip install dbt-fabric
      - name: dbt deps
        working-directory: transform/dbt
        run: dbt deps
      - name: dbt build (dev)
        working-directory: transform/dbt
        run: dbt build --target dev
      - name: dbt source freshness
        working-directory: transform/dbt
        run: dbt source freshness
      - name: Generate dbt docs
        working-directory: transform/dbt
        run: dbt docs generate
      - name: Upload dbt docs
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: transform/dbt/target/

  # ── 6. Fabric REST deploy (main only — replaces Git integration) ──────────
  # Upserts PySpark notebooks from transform/spark/ into the Fabric workspace.
  # Skipped automatically on PRs and forks (no FABRIC_WORKSPACE_ID secret).
  # Add FABRIC_WORKSPACE_ID to repo secrets to activate.
  fabric-deploy:
    name: Deploy to Fabric
    runs-on: ubuntu-latest
    needs: [lint-python, pytest]
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.FABRIC_WORKSPACE_ID != ''
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      FABRIC_WORKSPACE_ID: ${{ vars.FABRIC_WORKSPACE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deploy dependencies
        run: pip install requests azure-identity
      - name: Dry-run on PR / feature branches (sanity check)
        run: python infra/fabric_deploy.py --workspace-id "$FABRIC_WORKSPACE_ID" --dry-run
      - name: Deploy notebooks to Fabric workspace
        run: python infra/fabric_deploy.py --workspace-id "$FABRIC_WORKSPACE_ID"
