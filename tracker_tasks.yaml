# tracker_tasks.yaml — versioned single source of truth for all phases and tasks.
# This file is the contract between the project plan and the tracker datastore.
# Rules:
#   - Never reuse or renumber stable task IDs (id fields). History depends on them.
#   - Add tasks here; never hand-edit the datastore directly.
#   - The sync pipeline upserts from this file — re-running is always safe.
version: 1
project: grid-intelligence-platform
phases:
  - id: T0
    name: Foundation and Governance Baseline
    tasks:
      - id: T0-1
        title: Activate Fabric trial capacity and record expiry date (East-US, Trial End Date: 2026-08-12)
      - id: T0-2
        title: Create dev, test, and prod via Deployment Pipelines
      - id: T0-3
        title: Connect Fabric Git integration and scaffold repository skeleton
      - id: T0-4
        title: Define naming conventions and branching strategy
      - id: T0-5
        title: Provision Key Vault and document secrets handling
      - id: T0-6
        title: Draw architecture diagram and seed theory companion
      - id: T0-7
        title: Define data contract and business questions
      - id: T0-8
        title: Enable Capacity Metrics app for cost monitoring

  - id: T1
    name: Batch Ingestion to Bronze
    tasks:
      - id: T1-1
        title: Build EIA batch loader into bronze
      - id: T1-2
        title: Build Carbon Intensity history loader into bronze
      - id: T1-3
        title: Build Open-Meteo weather loader into bronze
      - id: T1-4
        title: Implement watermarking and offset pagination
      - id: T1-5
        title: Implement idempotent incremental loads
      - id: T1-6
        title: Validate payloads against pydantic contracts

  - id: T2
    name: Real-Time Ingestion and Alerting
    tasks:
      - id: T2-1
        title: Build Dockerised event producer with telemetry and polled readings
      - id: T2-2
        title: Create Eventstream and route to Eventhouse
      - id: T2-3
        title: Build Real-Time Dashboard on Eventhouse
      - id: T2-4
        title: Configure Activator alert on a threshold
      - id: T2-5
        title: Document KQL monitoring queries

  - id: T3
    name: Transformation and Dimensional Modelling
    tasks:
      - id: T3-1
        title: Spark silver layer — cleanse, conform, and deduplicate
      - id: T3-2
        title: Implement slowly changing dimensions
      - id: T3-3
        title: Build gold star schema with dbt-fabric
      - id: T3-4
        title: Configure materializations within Fabric constraints
      - id: T3-5
        title: Add stored procedures for set-based maintenance
      - id: T3-6
        title: Add dbt tests and Great Expectations quality gates

  - id: T4
    name: Governance, Lineage, Quality, and Security
    tasks:
      - id: T4-1
        title: Apply sensitivity labels and build business glossary in Purview
      - id: T4-2
        title: Implement Row-Level Security in Warehouse and semantic model
      - id: T4-3
        title: Configure OneLake security
      - id: T4-4
        title: Add dbt source freshness and Monitoring Hub observability
      - id: T4-5
        title: Enforce data contracts at layer transitions

  - id: T5
    name: Orchestration
    tasks:
      - id: T5-1
        title: Build end-to-end Data Factory orchestration
      - id: T5-2
        title: Coordinate batch and streaming paths
      - id: T5-3
        title: Add retries, failure alerting, and run logging
      - id: T5-4
        title: Prepare Airflow in Docker as the portable variant

  - id: T6
    name: CI/CD, Version Control, and Containerisation
    tasks:
      - id: T6-1
        title: Build GitHub Actions pipeline — lint, dbt build and test, quality, deploy
      - id: T6-2
        title: Add pre-commit hooks with secret scanning
      - id: T6-3
        title: Build Docker images for producer and dbt runtime
      - id: T6-4
        title: Configure branching, conventional commits, and semantic tags
      - id: T6-5
        title: Wire Deployment Pipelines promotion

  - id: T7
    name: Analytics and Visualisation
    tasks:
      - id: T7-1
        title: Build Power BI semantic model on DirectLake
      - id: T7-2
        title: Build executive dashboard — branded and KPI-led
      - id: T7-3
        title: Finalise the live Real-Time Dashboard
      - id: T7-4
        title: Validate every visual against a business question

  - id: T8
    name: Documentation, Packaging, and Decommission
    tasks:
      - id: T8-1
        title: Finalise theory companion, data dictionary, README, and runbook
      - id: T8-2
        title: Record walkthrough and capture screenshots
      - id: T8-3
        title: Draft CAR resume bullets and LinkedIn content
      - id: T8-4
        title: Export OneLake data and dbt artifacts
      - id: T8-5
        title: Pause or delete trial capacity and confirm cost stop
