version: 2

models:
  - name: fact_demand
    description: "Hourly ERCOT electricity demand — grain: one row per (period_utc, respondent)."
    columns:
      - name: demand_key
        description: "Natural key carried from stg_demand."
        tests: [not_null, unique]
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: region_key
        tests:
          - relationships:
              to: ref('dim_region')
              field: region_key
      - name: demand_mwh
        tests: [not_null]
      - name: demand_mw
        tests: [not_null]

  - name: fact_generation
    description: "Hourly ERCOT generation by fuel type — grain: (period_utc, respondent, fuel_type)."
    columns:
      - name: generation_key
        tests: [not_null, unique]
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: fuel_type_key
        tests:
          - relationships:
              to: ref('dim_fuel_type')
              field: fuel_type_key
      - name: generation_mwh
        tests: [not_null]

  - name: fact_carbon_intensity
    description: "Half-hourly GB carbon intensity — grain: (period_from, period_to)."
    columns:
      - name: carbon_intensity_key
        tests: [not_null, unique]
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: intensity_gco2_kwh
        tests: [not_null]
      - name: intensity_band
        tests:
          - not_null
          - accepted_values:
              values: ['Very Low', 'Low', 'Moderate', 'High', 'Very High']
